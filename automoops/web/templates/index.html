<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <title>AUTOMOOPS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #1a1a2e; }
    header { background: #1a1a2e; color: #fff; padding: 18px 32px; font-size: 1.3rem; font-weight: 700; letter-spacing: 2px; }
    .container { max-width: 900px; margin: 32px auto; padding: 0 20px; display: flex; flex-direction: column; gap: 20px; }
    .card { background: #fff; border-radius: 10px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .card h2 { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: #888; margin-bottom: 16px; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; }
    .url-row { display: flex; gap: 10px; }
    input[type="text"] { flex: 1; padding: 11px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    input[type="text"]:focus { border-color: #4f46e5; }
    button { padding: 11px 22px; border: none; border-radius: 6px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .btn-load { background: #059669; color: #fff; white-space: nowrap; }
    .btn-load:hover { background: #047857; }
    .btn-workflow { background: #1a1a2e; color: #fff; padding: 12px 28px; }
    .btn-workflow:hover { background: #2d2d4e; }
    .status { font-size: 0.88rem; padding: 10px 14px; border-radius: 6px; margin-top: 12px; display: none; }
    .status.info  { background: #eff6ff; color: #1d4ed8; display: block; }
    .status.ok    { background: #f0fdf4; color: #166534; display: block; }
    .status.error { background: #fef2f2; color: #991b1b; display: block; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .field { margin-bottom: 12px; }
    .field:last-child { margin-bottom: 0; }
    .field label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #999; display: block; margin-bottom: 3px; }
    .field .value { font-size: 0.93rem; color: #1a1a2e; word-break: break-word; white-space: pre-wrap; }
    .field .value.empty { color: #ccc; font-style: italic; }
    .workflow-grid { display: flex; flex-wrap: wrap; gap: 12px; }
    .product-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #f4f4f4; font-size: 0.92rem; }
    .product-row:last-child { border-bottom: none; }
    .product-code { color: #1a1a2e; font-family: monospace; }
    .product-qty { font-weight: 700; color: #4f46e5; }
    .product-section-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #bbb; margin: 10px 0 4px; }
    #results { display: none; }
    #workflow-section { display: none; }
  </style>
</head>
<body>
<header>AUTOMOOPS</header>
<div class="container">

  <div class="card">
    <div class="url-row">
      <input type="text" id="moops-url" placeholder="Paste MOOPS order URL and press Enter..." />
      <button class="btn-load" onclick="load()">Load &amp; Extract</button>
    </div>
    <div id="status" class="status"></div>
  </div>

  <div id="results">
    <div class="two-col">
      <div class="card">
        <h2>Customer Info</h2>
        <div class="field"><label>Customer</label><div class="value" id="f-customer"></div></div>
        <div class="field"><label>Contact</label><div class="value" id="f-contact"></div></div>
        <div class="field"><label>Email</label><div class="value" id="f-email"></div></div>
        <div class="field"><label>Phone</label><div class="value" id="f-phone"></div></div>
        <div class="field"><label>Address</label><div class="value" id="f-address"></div></div>
      </div>
      <div class="card">
        <h2>Shipping Info</h2>
        <div class="field"><label>Ship To</label><div class="value" id="f-ship-location"></div></div>
        <div class="field"><label>Street</label><div class="value" id="f-ship-street"></div></div>
        <div class="field"><label>City</label><div class="value" id="f-ship-city"></div></div>
        <div class="field"><label>State</label><div class="value" id="f-ship-state"></div></div>
        <div class="field"><label>Zip</label><div class="value" id="f-ship-zip"></div></div>
        <div class="field"><label>Attn</label><div class="value" id="f-ship-contact"></div></div>
        <div class="field"><label>Phone</label><div class="value" id="f-ship-phone"></div></div>
      </div>
    </div>
  </div>

  <div class="card" id="products-section" style="display:none">
    <h2>Order Products</h2>
    <div class="two-col" style="margin-bottom:14px">
      <div class="field"><label>Sales Order</label><div class="value" id="f-so-number"></div></div>
      <div class="field"><label>SO URL</label><div class="value" id="f-so-url"></div></div>
    </div>
    <div id="products-content"></div>
  </div>

  <div class="card" id="workflow-section">
    <h2>Run Workflow</h2>
    <div class="workflow-grid">
      {% for key, name in workflows.items() %}
      <button class="btn-workflow" onclick="runWorkflow('{{ key }}', '{{ name }}')">{{ name }}</button>
      {% endfor %}
    </div>
  </div>

</div>
<script>
  let currentOrder = null;

  function setStatus(msg, type) {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = "status " + type;
  }

  function setField(id, v) {
    const el = document.getElementById(id);
    el.textContent = v || "—";
    el.className = "value" + (v ? "" : " empty");
  }

  async function load() {
    const url = document.getElementById("moops-url").value.trim();
    if (!url) return;
    setStatus("Loading and extracting...", "info");
    document.getElementById("results").style.display = "none";
    document.getElementById("workflow-section").style.display = "none";
    try {
      const res = await fetch("/load", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url })
      });
      const data = await res.json();
      if (data.error) { setStatus("Error: " + data.error, "error"); return; }
      currentOrder = data;
      const s = data.shipping || {};
      setField("f-customer", data.customer_name);
      setField("f-contact", data.contact_name);
      setField("f-email", data.email);
      setField("f-phone", data.phone);
      setField("f-address", data.location_address);
      setField("f-ship-location", s.shipping_location);
      setField("f-ship-street", s.shipping_street);
      setField("f-ship-city", s.shipping_city);
      setField("f-ship-state", s.shipping_state);
      setField("f-ship-zip", s.shipping_zip);
      setField("f-ship-contact", s.shipping_contact);
      setField("f-ship-phone", s.shipping_phone);
      setField("f-so-number", data.so_number);
      setField("f-so-url", data.so_url);
      renderProducts(data.products || {});
      setStatus("Extracted.", "ok");
      document.getElementById("results").style.display = "block";
      document.getElementById("products-section").style.display = "block";
      document.getElementById("workflow-section").style.display = "block";
    } catch (e) {
      setStatus("Error: " + e.message, "error");
    }
  }

  function renderProducts(p) {
    const el = document.getElementById("products-content");
    let html = "";

    if (p.vac_qty > 0) {
      html += '<div class="product-section-label">VACs</div>';
      html += `<div class="product-row"><span class="product-code">VAC</span><span class="product-qty">${p.vac_qty}</span></div>`;
    }
    if (p.reader_kits > 0) {
      html += '<div class="product-section-label">Reader Kits</div>';
      html += `<div class="product-row"><span class="product-code">Reader Kit</span><span class="product-qty">${p.reader_kits}</span></div>`;
    }
    if (p.cards && p.cards.length > 0) {
      html += '<div class="product-section-label">Cards</div>';
      for (const c of p.cards) {
        html += `<div class="product-row"><span class="product-code">${c.code}</span><span class="product-qty">${c.qty}</span></div>`;
      }
    }
    if (p.other && p.other.length > 0) {
      html += '<div class="product-section-label">Other</div>';
      for (const c of p.other) {
        html += `<div class="product-row"><span class="product-code">${c.code}</span><span class="product-qty">${c.qty}</span></div>`;
      }
    }
    if (!html) {
      html = '<div style="color:#bbb;font-size:0.88rem;font-style:italic">No products found.</div>';
    }
    el.innerHTML = html;
  }

  async function runWorkflow(key, name) {
    if (!currentOrder) { setStatus("Load an order first.", "error"); return; }
    setStatus("Running " + name + "...", "info");
    try {
      const res = await fetch("/workflow/" + key, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(currentOrder)
      });
      const data = await res.json();
      if (data.ok) {
        setStatus(name + " form filled — review and submit in the browser window.", "ok");
      } else {
        setStatus("Error: " + data.error, "error");
      }
    } catch (e) {
      setStatus("Error: " + e.message, "error");
    }
  }

  document.getElementById("moops-url").addEventListener("keydown", e => {
    if (e.key === "Enter") load();
  });
</script>
</body>
</html>
